# MAMI — distributed architecture (foundational slice)
#
#   ingestion ──market.ticks──▶ risk-engine ─┐
#       ▲                       ml-service  ─┼─▶ Redis ◀── api-gateway ──▶ dashboard
#       └──market.commands── api-gateway ────┘
#
# Run:   docker compose up --build
# Open:  http://localhost:8000   (dashboard)  ·  /docs (API)
#
# GPU: the risk-engine uses CuPy automatically if a CUDA GPU + CuPy are present;
# otherwise it falls back to NumPy. To enable GPU, add cupy to its requirements
# and the NVIDIA container runtime to that service. CPU works out of the box.

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"          # host access (e.g. console tools): localhost:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Dual listeners: in-cluster services use kafka:29092, host uses localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:29092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
    restart: unless-stopped

  risk-engine:
    build:
      context: .
      dockerfile: services/risk_engine/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      REDIS_URL: redis://redis:6379/0
      MONTE_CARLO_PATHS: "5000"
    restart: unless-stopped

  ml-service:
    build:
      context: .
      dockerfile: services/ml_service/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      REDIS_URL: redis://redis:6379/0
    restart: unless-stopped
